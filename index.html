<body>
    <div id="app">
    <aside>
      <div class="aside-container">
        <header>
            <img src="assets/icons/Logo.svg" alt="">
          <h1>Festivite</h1>
          <p>Crie um convite digital para o seu evento</p>
        </header>
      </div>

    <main class="forms">
      <h2>Crie seu convite</h2>
      <div class="começo">
      <img src="assets/icons/calendar.svg" alt="">
      <p>Sobre o evento</p>
    </div>

   <form method="post" enctype="text/plain">
  <fieldset class="primeiro">
    
    <div class="input-wrapper">
      <label for="title">Título</label>
      <input type="text" name="title" id="title" placeholder="Nome do evento">
    </div>

    <div class="date-grid">
      <div class="input-wrapper">
        <label for="start">Início</label>
        <input type="datetime-local" id="start" name="start">
      </div>

      <div class="input-wrapper">
        <label for="end">Fim</label>
        <input type="datetime-local" id="end" name="end">
      </div>
    </div>

    <div class="tipo-local-grid">
      <div class="tipo-wrapper">
        <label>Tipo</label>

        <div class="tipo-buttons">
          <button type="button" class="active">
            <img src="assets/icons/building-2.svg" alt="">
            Presencial
          </button>

          <button type="button">
            <img src="assets/icons/video2.svg" alt="">
            Online
          </button>
        </div>
      </div>

      <div class="input-wrapper">
        <label>Local</label>
        <input type="text" placeholder="Link ou endereço">
      </div>
    </div>

    <div class="input-wrapper descricao">
      <label>Descrição</label>
      <textarea placeholder="Escreva sobre os detalhes do evento"></textarea>
    </div>

  </fieldset>
</form>

<script>
const buttons = document.querySelectorAll('.tipo-buttons button');

buttons.forEach(button => {
  button.addEventListener('click', () => {

    // remove active de todos
    buttons.forEach(btn => btn.classList.remove('active'));

    // adiciona no clicado
    button.classList.add('active');
  });
});
</script>
